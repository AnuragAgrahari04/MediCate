{% extends 'base.html' %}
{% block title %}Admin Login — Medicate{% endblock %}
{% block extra_css %}
<style>
.auth-page{min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
.auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xl);box-shadow:var(--shadow-xl);width:100%;max-width:440px;overflow:hidden;}
.auth-header{background:linear-gradient(135deg,#1A1A2E,#16213E);padding:2.5rem 2rem;text-align:center;}
.auth-header h2{color:#fff;font-family:var(--font-display);margin-bottom:0.375rem;}
.auth-header p{color:rgba(255,255,255,0.6);font-size:0.875rem;}
.auth-body{padding:2rem;}
.input-icon-wrap{position:relative;}
.input-icon{position:absolute;left:0.875rem;top:50%;transform:translateY(-50%);pointer-events:none;}
.input-icon-wrap .form-control{padding-left:2.5rem;}
</style>
{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span style="font-size:3rem;display:block;margin-bottom:0.75rem;">🛡️</span>
      <h2>Admin Login</h2>
      <p>Platform administration access</p>
    </div>
    <div class="auth-body">
      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Username</label>
          <div class="input-icon-wrap">
            <span class="input-icon">👤</span>
            <input type="text" name="username" class="form-control" placeholder="Admin username" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" name="password" class="form-control" placeholder="Admin password" required>
          </div>
        </div>
        <button type="submit" class="btn btn-pill w-full" style="padding:0.875rem;background:linear-gradient(135deg,#1A1A2E,#16213E);color:#fff;">
          Admin Sign In →
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
