{% extends 'base.html' %}
{% block title %}Feedback — Medicate{% endblock %}
{% block content %}
<div style="min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:2rem 1rem;">
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xl);box-shadow:var(--shadow-xl);width:100%;max-width:520px;overflow:hidden;">
    <div style="background:linear-gradient(135deg,var(--brand-navy),#1A4A7A);padding:2rem;text-align:center;">
      <div style="font-size:3rem;margin-bottom:0.75rem;">💬</div>
      <h2 style="color:#fff;margin-bottom:0.25rem;">Give Feedback</h2>
      <p style="color:rgba(255,255,255,0.7);font-size:0.875rem;">Help us improve Medicate</p>
    </div>
    <div style="padding:2rem;">
      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Your feedback</label>
          <textarea name="message" class="form-control" rows="5" placeholder="What can we improve? What do you love?" required></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Overall rating</label>
          <select name="rating" class="form-control">
            <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
            <option value="4">⭐⭐⭐⭐ Good</option>
            <option value="3">⭐⭐⭐ Average</option>
            <option value="2">⭐⭐ Below average</option>
            <option value="1">⭐ Poor</option>
          </select>
        </div>
        <button type="submit" class="btn btn-gradient btn-pill w-full" style="padding:0.875rem;">
          Submit Feedback →
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
