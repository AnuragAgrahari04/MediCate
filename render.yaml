services:
  - type: web
    name: medicate
    runtime: python
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python ml/predictor.py
    startCommand: daphne -b 0.0.0.0 -p $PORT medicate.asgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: medicate-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: medicate-redis
          type: redis
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.1"
      - key: AGORA_APP_ID
        sync: false
      - key: AGORA_APP_CERT
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GOOGLE_MAPS_KEY
        sync: false

databases:
  - name: medicate-db
    databaseName: medicate
    user: medicate

  - name: medicate-redis
    type: redis